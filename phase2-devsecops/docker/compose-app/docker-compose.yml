version: '3.8'

services:
  
  webapp:
    build: .
    container_name: compose-webapp
    restart: unless-stopped
    environment:
      - Redis_HOST=redis
    depends_on:
      - redis
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: compose-nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - webapp
    networks:
      - app-network
  
  redis:
    image: redis:7-alpine
    container_name: compose-redis
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

