name: CI/CD Pipeline

on: 
    push:
        branches: [ main ]
    pull_request: 
        branches: [ main ]

jobs:
    security-scan:
        name: Security Scan
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Run Trivy security scan
              uses : aquasecurity/trivy-action@master
              with:
                  scan-type: fs
                  scan-ref: .
                  scanners: secret,misconfig
                  exit-code: 0

    build-and-push:
        name: Build and Push Docker Image
        runs-on: ubuntu-latest
        needs: security-scan
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Login to Docker Hub
              uses: docker/login-action@0v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                context: phase2-devsecops/docker/webapp/
                push: true
                tags: |
                    digensclub/devops-lab-webapp:latest
                    digensclub/devops-lab-webapp:${{ github.run_number }}

            - name: Image summary
              run: |
                echo "Image pushed: digensclub/devops-lab-webapp:${{ github.run_number }}"
                echo "Also tagged as: latest"
  
